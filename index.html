<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反应釜月度排产计划</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 13px;
  background: #f5f5f0;
  color: #1a1a18;
  min-height: 100vh;
  padding: 16px;
}
.wrap { max-width: 100%; }

/* ---- Top bar ---- */
.topbar {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 14px; flex-wrap: wrap;
}
.topbar h1 { font-size: 16px; font-weight: 500; }
.month-nav { display: flex; align-items: center; gap: 6px; }
.month-nav button {
  background: #fff; border: 0.5px solid rgba(0,0,0,0.28);
  border-radius: 6px; padding: 4px 12px; cursor: pointer;
  font-size: 14px; color: #5f5e5a;
}
.month-nav button:hover { border-color: rgba(0,0,0,0.45); color: #1a1a18; }
.month-label {
  font-size: 14px; font-weight: 500; min-width: 100px; text-align: center;
}
.btn {
  background: #fff; border: 0.5px solid rgba(0,0,0,0.28);
  border-radius: 8px; padding: 6px 14px; cursor: pointer;
  font-size: 12px; color: #5f5e5a;
}
.btn:hover { border-color: rgba(0,0,0,0.45); color: #1a1a18; }
.btn.primary { background: #e6f1fb; border-color: #85b7eb; color: #185fa5; }
.btn.primary:hover { background: #d0e7f8; }
.btn.danger  { color: #a32d2d; border-color: #f09595; }

/* ---- Stats ---- */
.stats {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 14px;
}
@media(max-width:700px){ .stats{ grid-template-columns: repeat(2,1fr); } }
.stat-card { background: #eeecea; border-radius: 8px; padding: 10px 14px; }
.stat-label { font-size: 11px; color: #888780; margin-bottom: 3px; }
.stat-val   { font-size: 22px; font-weight: 500; color: #1a1a18; }
.stat-sub   { font-size: 11px; color: #b4b2a9; margin-top: 2px; }

/* ---- Legend ---- */
.legend-bar {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap; margin-bottom: 12px;
}
.legend-item {
  display: flex; align-items: center; gap: 4px;
  font-size: 12px; color: #5f5e5a; cursor: pointer;
  padding: 3px 8px; border-radius: 6px;
  border: 0.5px solid transparent;
  user-select: none; transition: border-color 0.15s;
}
.legend-item:hover { border-color: rgba(0,0,0,0.2); }
.legend-item.selected { border-color: rgba(0,0,0,0.4); }
.legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.legend-sep { width: 0.5px; height: 18px; background: rgba(0,0,0,0.12); margin: 0 4px; }

/* ---- Table area ---- */
.table-wrap { overflow: auto; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.12); background: #fff; }
table {
  border-collapse: collapse;
  table-layout: fixed;
  min-width: 900px;
  width: 100%;
}
thead th {
  background: #fafaf8;
  border-bottom: 0.5px solid rgba(0,0,0,0.1);
  border-right: 0.5px solid rgba(0,0,0,0.07);
  padding: 5px 2px;
  font-size: 11px; font-weight: 500; color: #888780;
  text-align: center; white-space: nowrap;
  position: sticky; top: 0; z-index: 10;
}
thead th.col-reactor {
  width: 74px; min-width: 74px; left: 0; z-index: 20;
  text-align: left; padding-left: 10px;
  background: #fafaf8;
}
thead th.day-hd { width: 34px; min-width: 32px; }
thead th.today-hd { background: #fcebeb; color: #a32d2d; }
tbody tr { border-bottom: 0.5px solid rgba(0,0,0,0.07); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover td { background: #fafaf8 !important; }
tbody td {
  border-right: 0.5px solid rgba(0,0,0,0.06);
  padding: 0; height: 34px; vertical-align: middle;
  text-align: center; cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
tbody td.col-reactor {
  position: sticky; left: 0; z-index: 5; background: #fff;
  padding: 0 8px; text-align: left; cursor: default;
}
tbody td.col-reactor:hover { background: #fff !important; }
.reactor-name { font-weight: 500; font-size: 12px; }
.reactor-cap  { font-size: 10px; color: #888780; }
.cell-block {
  display: block; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 500; line-height: 1.2;
  padding: 1px 2px; overflow: hidden;
}
.cell-empty { color: transparent; }
.cell-empty:hover { background: rgba(0,0,0,0.04); color: #b4b2a9; }
td.weekend { background: #f9f8f5; }
td.today-col { background: #fff8f8; }

/* ---- Side panel ---- */
.panel {
  background: #fff; border: 0.5px solid rgba(0,0,0,0.18);
  border-radius: 12px; padding: 16px; margin-top: 14px; display: none;
}
.panel.open { display: block; }
.panel-title { font-size: 13px; font-weight: 500; margin-bottom: 12px; }
.panel-hd { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.form-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; align-items:center; }
.form-label { font-size:12px; color:#888780; min-width:56px; flex-shrink:0; }
.form-row select, .form-row input[type="text"], .form-row input[type="color"] {
  flex:1; min-width:100px; font-size:12px; padding:5px 8px;
  border:0.5px solid rgba(0,0,0,0.22); border-radius:6px;
  background:#fff; color:#1a1a18; outline:none;
}
.form-row input[type="color"] { min-width:48px; max-width:48px; padding:2px 4px; height:30px; cursor:pointer; }
.form-row select:focus, .form-row input:focus { border-color:#85b7eb; }
.form-actions { display:flex; gap:8px; margin-top:8px; }

/* right-click context menu */
.ctx-menu {
  position: fixed; background: #fff;
  border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  padding: 4px 0; display: none; z-index: 999; min-width: 140px;
}
.ctx-item {
  padding: 7px 14px; font-size: 12px; cursor: pointer; color: #1a1a18;
}
.ctx-item:hover { background: #f5f5f0; }
.ctx-item.danger { color: #a32d2d; }

/* tooltip */
.tooltip {
  position: fixed; background: rgba(28,28,26,0.9); color:#fff;
  font-size:12px; padding:6px 10px; border-radius:6px;
  pointer-events:none; display:none; z-index:1000;
  max-width:200px; line-height:1.6; white-space:pre-line;
}

/* print */
@media print {
  body { background:#fff; padding:4px; }
  .topbar .btn, .panel, .ctx-menu, .tooltip { display:none !important; }
  .table-wrap { border:1px solid #ccc; overflow:visible; }
}
</style>
<style>
/* cloud setup banner */
.cloud-banner {
  background: #fff8e1; border: 0.5px solid #f0d060;
  border-radius: 8px; padding: 10px 14px; margin-bottom: 14px;
  font-size: 12px; color: #7a6000; display: none;
}
.cloud-banner a { color: #185fa5; }
.cloud-banner.show { display: block; }
</style>
</head>

<script>
// ==================== JSONBin.io 配置 ====================
const JSONBIN_CONFIG = {
  planBinUrl:  'https://api.jsonbin.io/v3/c/69fc394d250b1311c3165cc1/b/69fc3a51c0954111d8eb7350',
  metaBinUrl:  'https://api.jsonbin.io/v3/c/69fc394d250b1311c3165cc1/b/69fc3a63adc21f119a661957',
  apiKey:      '$2a$10$AIHslyU.A7cJ6r.Ap72o0.xHsPPjWjSKu.4r6915IdJmMYrfkO7eC',
};
const USE_CLOUD = JSONBIN_CONFIG.planBinUrl && JSONBIN_CONFIG.metaBinUrl && JSONBIN_CONFIG.apiKey;

// ==================== 存储 Key（本地兜底）====================
const LS_PLAN      = 'mplan_data';
const LS_PROJECTS  = 'mplan_projects';
const LS_REACTORS  = 'mplan_reactors';

// ==================== 默认数据 ========================
function defaultReactors() {
  const rs = [];
  for (let i = 1; i <= 26; i++) {
    rs.push({ id: 'R-' + String(i).padStart(2,'0'), name: i + '号釜', cap: '' });
  }
  return rs;
}

const DEFAULT_PROJECTS = [];

// ==================== 状态变量 ========================
let plan = {};
let projects = [];
let reactors = [];
let pidCounter = 7;
let syncStatus = '加载中...';

// ==================== 云端 API ========================
async function cloudFetch(url, method, body, timeoutMs) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs || 5000);
  try {
    const opts = {
      method: method || 'GET',
      signal: ctrl.signal,
      headers: {
        'X-Master-Key': JSONBIN_CONFIG.apiKey,
        'X-Bin-Meta': 'false',
      },
    };
    if (body) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    const res = await fetch(url, opts);
    clearTimeout(timer);
    if (!res.ok) throw new Error(method + ' ' + res.status);
    return res.json();
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

// ==================== 加载数据 ========================
function unwrap(data) {
  if (data && typeof data === 'object' && 'record' in data) return data.record;
  return data;
}

async function loadFromCloud() {
  if (!USE_CLOUD) return null;
  try {
    const metaRaw    = await cloudFetch(JSONBIN_CONFIG.metaBinUrl,  'GET', null, 10000);
    const planRaw    = await cloudFetch(JSONBIN_CONFIG.planBinUrl,  'GET', null, 10000).catch(() => ({}));
    const meta      = unwrap(metaRaw) || {};
    const planData  = unwrap(planRaw) || {};

    if (!meta || (Array.isArray(meta.projects) && meta.projects.length === 0 &&
                  Object.keys(planData).length === 0)) {
      return null; // 空 bin 认为无数据
    }

    return {
      projects: Array.isArray(meta.projects) ? meta.projects : [],
      reactors: Array.isArray(meta.reactors) && meta.reactors.length > 0
                  ? meta.reactors : defaultReactors(),
      plan: typeof planData === 'object' && planData !== null ? planData : {},
    };
  } catch(e) {
    console.warn('云端读取失败，回退到本地:', e);
    return null;
  }
}

function loadFromLocal() {
  try {
    return {
      plan:     JSON.parse(localStorage.getItem(LS_PLAN))     || {},
      projects: JSON.parse(localStorage.getItem(LS_PROJECTS)) || [],
      reactors: JSON.parse(localStorage.getItem(LS_REACTORS)) || defaultReactors(),
    };
  } catch(e) {
    return { plan: {}, projects: [], reactors: defaultReactors() };
  }
}

function mergeLocal(cloud, local) {
  // 云端为主，但保留本地独有的数据（跨设备使用）
  if (!cloud.plan || Object.keys(cloud.plan).length === 0) {
    return local;
  }
  return cloud;
}

// ==================== 保存数据 ========================
let saveTimer = null;
let pendingSave = false;

async function persistData() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    pendingSave = true;
    setSyncStatus('保存中...');
    try {
      if (USE_CLOUD) {
        await Promise.all([
          cloudFetch(JSONBIN_CONFIG.metaBinUrl, 'PUT', { projects, reactors }, 10000),
          cloudFetch(JSONBIN_CONFIG.planBinUrl, 'PUT',  plan, 10000),
        ]);
      }
      localStorage.setItem(LS_PLAN,      JSON.stringify(plan));
      localStorage.setItem(LS_PROJECTS, JSON.stringify(projects));
      localStorage.setItem(LS_REACTORS, JSON.stringify(reactors));
      setSyncStatus('已同步');
    } catch(e) {
      const errMsg = e.message || e.name || '网络错误';
      console.warn('云端保存失败，仅本地保存:', e);
      localStorage.setItem(LS_PLAN,      JSON.stringify(plan));
      localStorage.setItem(LS_PROJECTS, JSON.stringify(projects));
      localStorage.setItem(LS_REACTORS, JSON.stringify(reactors));
      setSyncStatus('仅本地保存(' + errMsg + ')');
    }
    pendingSave = false;
  }, 400);
}

// ==================== 辅助 ========================
function setSyncStatus(txt) {
  syncStatus = txt;
  const el = document.getElementById('syncStatus');
  if (el) el.textContent = txt;
}

function planKey(rId, year, month, day) {
  return `${rId}__${year}_${String(month+1).padStart(2,'0')}_${String(day).padStart(2,'0')}`;
}
function daysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }
function isWeekend(y, m, d) { const w = new Date(y,m,d).getDay(); return w===0||w===6; }
function isToday2(y, m, d) {
  const n = new Date();
  return n.getFullYear()===y && n.getMonth()===m && n.getDate()===d;
}
function fmtMonth(y, m) { return y + '年' + (m+1) + '月'; }
function getProject(id) { return projects.find(p => p.id === id); }
function lightenHex(hex, pct) {
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.round(r + (255-r) * pct);
  g = Math.round(g + (255-g) * pct);
  b = Math.round(b + (255-b) * pct);
  return '#' + [r,g,b].map(v=>String(Math.min(255,v).toString(16).padStart(2,'0'))).join('');
}

// 全局 saveState 兼容旧调用
function saveState() { persistData(); }

// ==================== State ========================
let viewYear, viewMonth;
(function initDate() {
  const now = new Date();
  viewYear  = now.getFullYear();
  viewMonth = now.getMonth();
})();

let selectedProjectId = null;
let ctxTarget = null;

// ==================== Legend ====================
function buildLegend() {
  const bar = document.getElementById('legendBar');
  bar.innerHTML = '<span style="font-size:12px;color:#888780;margin-right:4px">点选项目：</span>';
  projects.forEach(p => {
    const item = document.createElement('div');
    item.className = 'legend-item' + (p.id === selectedProjectId ? ' selected' : '');
    item.dataset.pid = p.id;
    item.innerHTML = `<div class="legend-dot" style="background:${p.color}"></div>${p.name}`;
    item.addEventListener('click', () => {
      if (selectedProjectId === p.id) {
        selectedProjectId = null;
      } else {
        selectedProjectId = p.id;
      }
      buildLegend();
    });
    item.addEventListener('contextmenu', e => {
      e.preventDefault();
      showProjectCtxMenu(e.clientX, e.clientY, p.id);
    });
    bar.appendChild(item);
  });
}

// ==================== Table ====================
function buildTable() {
  const days = daysInMonth(viewYear, viewMonth);
  const thead = document.getElementById('tableHead');
  const tbody = document.getElementById('tableBody');
  thead.innerHTML = '';
  tbody.innerHTML = '';

  // --- Header row ---
  const htr = document.createElement('tr');
  // Fixed col
  const th0 = document.createElement('th');
  th0.className = 'col-reactor';
  th0.textContent = '釜位';
  htr.appendChild(th0);
  for (let d = 1; d <= days; d++) {
    const th = document.createElement('th');
    th.className = 'day-hd' + (isToday2(viewYear,viewMonth,d) ? ' today-hd' : '');
    const dow = ['日','一','二','三','四','五','六'][new Date(viewYear,viewMonth,d).getDay()];
    th.innerHTML = `<div>${d}</div><div style="font-size:10px;color:inherit">${dow}</div>`;
    htr.appendChild(th);
  }
  thead.appendChild(htr);

  // --- Reactor rows ---
  reactors.forEach(r => {
    const tr = document.createElement('tr');
    // Fixed reactor name cell
    const td0 = document.createElement('td');
    td0.className = 'col-reactor';
    td0.innerHTML = `<div class="reactor-name">${r.name}</div>${r.cap ? '<div class="reactor-cap">'+r.cap+'</div>' : ''}`;
    tr.appendChild(td0);

    for (let d = 1; d <= days; d++) {
      const td = document.createElement('td');
      const key = planKey(r.id, viewYear, viewMonth, d);
      const entry = plan[key];
      const proj = entry ? getProject(entry.pid) : null;

      if (isWeekend(viewYear,viewMonth,d) && !proj) td.classList.add('weekend');
      if (isToday2(viewYear,viewMonth,d) && !proj)  td.classList.add('today-col');

      if (proj) {
        td.style.background = proj.color;
        const span = document.createElement('span');
        span.className = 'cell-block';
        span.textContent = proj.name.length > 4 ? proj.name.slice(0,4) : proj.name;
        span.style.color = '#1a1a18';
        td.appendChild(span);
      } else {
        const span = document.createElement('span');
        span.className = 'cell-block cell-empty';
        span.textContent = '+';
        td.appendChild(span);
      }

      td.dataset.rid = r.id;
      td.dataset.day = d;

      // 双击：填入选中项目
      td.addEventListener('dblclick', () => {
        if (!selectedProjectId) return;
        const k = planKey(r.id, viewYear, viewMonth, d);
        plan[k] = { pid: selectedProjectId, note: '' };
        saveState();
        buildTable();
        calcStats();
      });

      // right-click: context menu
      td.addEventListener('contextmenu', e => {
        e.preventDefault();
        ctxTarget = { rId: r.id, day: d };
        showCtxMenu(e.clientX, e.clientY);
      });

      // hover tooltip
      td.addEventListener('mouseenter', e => {
        const k2 = planKey(r.id, viewYear, viewMonth, d);
        const ent = plan[k2];
        if (!ent) return;
        const pr = getProject(ent.pid);
        if (!pr) return;
        let txt = `${r.name}  ${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}\n${pr.name}`;
        if (ent.note) txt += '\n备注：' + ent.note;
        const tip = document.getElementById('tooltip');
        tip.textContent = txt;
        tip.style.display = 'block';
        tip.style.left = (e.clientX + 12) + 'px';
        tip.style.top  = (e.clientY - 4)  + 'px';
      });
      td.addEventListener('mousemove', e => {
        const tip = document.getElementById('tooltip');
        tip.style.left = (e.clientX + 12) + 'px';
        tip.style.top  = (e.clientY - 4)  + 'px';
      });
      td.addEventListener('mouseleave', () => {
        document.getElementById('tooltip').style.display = 'none';
      });

      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });
}

// ==================== Stats ====================
function calcStats() {
  const days = daysInMonth(viewYear, viewMonth);
  const total = reactors.length * days;
  let filledCount = 0;
  const pids = new Set();
  reactors.forEach(r => {
    for (let d = 1; d <= days; d++) {
      const k = planKey(r.id, viewYear, viewMonth, d);
      if (plan[k]) { filledCount++; pids.add(plan[k].pid); }
    }
  });
  const util = total > 0 ? Math.round(filledCount / total * 100) : 0;
  document.getElementById('sProjects').textContent = pids.size;
  document.getElementById('sFilled').textContent   = filledCount;
  document.getElementById('sUtil').textContent     = util + '%';
  document.getElementById('sIdle').textContent     = total - filledCount;
}

  ctxMenu.style.top     = y + 'px';

}

  hideCtxMenu();

});
document.addEventListener('keydown', e => { if (e.key==='Escape') { hideCtxMenu(); closeAllPanels(); } });


document.getElementById('ctxEdit').addEventListener('click', () => {
  if (!ctxTarget) return;

});
document.getElementById('ctxFillRow').addEventListener('click', () => {
  if (!ctxTarget || !selectedProjectId) { alert('请先在图例中选择一个项目'); return; }

  for (let d = 1; d <= days; d++) {
    plan[planKey(ctxTarget.rId, viewYear, viewMonth, d)] = { pid: selectedProjectId, note: '' };
  }
  saveState(); buildTable(); calcStats(); hideCtxMenu();
});
document.getElementById('ctxFillCol').addEventListener('click', () => {
  if (!ctxTarget || !selectedProjectId) { alert('请先在图例中选择一个项目'); return; }
  reactors.forEach(r => {
    plan[planKey(r.id, viewYear, viewMonth, ctxTarget.day)] = { pid: selectedProjectId, note: '' };
  });

});
document.getElementById('ctxClearRow').addEventListener('click', () => {
  if (!ctxTarget) return;

  for (let d = 1; d <= days; d++) {
    delete plan[planKey(ctxTarget.rId, viewYear, viewMonth, d)];

  saveState(); buildTable(); calcStats(); hideCtxMenu();
});
document.getElementById('ctxClearCell').addEventListener('click', () => {
  if (!ctxTarget) return;
  delete plan[planKey(ctxTarget.rId, viewYear, viewMonth, ctxTarget.day)];
  saveState(); buildTable(); calcStats(); hideCtxMenu();
});

// ==================== Cell panel ====================
function openCellPanel(rId, day) {
  const r = reactors.find(x => x.id === rId);
  document.getElementById('cellPanelTitle').textContent =
    (r ? r.name : rId) + '  ' + viewYear + '-' + String(viewMonth+1).padStart(2,'0') + '-' + String(day).padStart(2,'0');

  const key = planKey(rId, viewYear, viewMonth, day);
  const ent = plan[key];
  const proj = ent ? getProject(ent.pid) : null;
  const detail = document.getElementById('cellDetail');

  if (proj) {
    detail.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;padding:10px;background:${proj.color};border-radius:8px;border:0.5px solid rgba(0,0,0,0.1)">
        <div style="width:20px;height:20px;border-radius:4px;background:${proj.color};border:1px solid rgba(0,0,0,0.15);flex-shrink:0"></div>
        <div>
          <div style="font-weight:500;font-size:14px">${proj.name}</div>
          ${proj.note ? '<div style="font-size:11px;color:#666;margin-top:2px">备注：' + proj.note + '</div>' : ''}
        </div>
      </div>`;
  } else {
    detail.innerHTML = '<div style="font-size:12px;color:#888780;padding:8px 0">此格暂无排产（点击图例项目后再单击格子填入）</div>';
  }

  document.getElementById('cellNote').value = ent ? (ent.note || '') : '';

  ctxTarget = { rId, day };
  openPanel('cellPanel');
}

document.getElementById('confirmCell').addEventListener('click', () => {
  if (!ctxTarget) return;
  const key  = planKey(ctxTarget.rId, viewYear, viewMonth, ctxTarget.day);
  const ent = plan[key];
  if (!ent) { closeAllPanels(); return; }
  ent.note = document.getElementById('cellNote').value.trim();
  saveState(); buildTable(); calcStats(); closeAllPanels();
});
document.getElementById('clearCell').addEventListener('click', () => {
  if (!ctxTarget) return;
  delete plan[planKey(ctxTarget.rId, viewYear, viewMonth, ctxTarget.day)];
  saveState(); buildTable(); calcStats(); closeAllPanels();
});
document.getElementById('cancelCell').addEventListener('click', closeAllPanels);
document.getElementById('closeCellPanel').addEventListener('click', closeAllPanels);

// ==================== Add project ====================
document.getElementById('addProjectBtn').addEventListener('click', () => openPanel('addProjectPanel'));
document.getElementById('cancelProject').addEventListener('click', closeAllPanels);
document.getElementById('pColor').addEventListener('input', function() {
  document.getElementById('pHex').value = this.value;
});
document.getElementById('pHex').addEventListener('input', function() {
  if (/^#[0-9a-fA-F]{6}$/.test(this.value)) document.getElementById('pColor').value = this.value;
});
document.getElementById('confirmProject').addEventListener('click', () => {
  const name  = document.getElementById('pName').value.trim();
  const color = document.getElementById('pColor').value;
  const note  = document.getElementById('pNote').value.trim();
  if (!name) { alert('请填写项目名称'); return; }
  projects.push({ id: 'p' + pidCounter++, name, color, note });
  saveState(); buildLegend(); closeAllPanels();
  document.getElementById('pName').value = '';
  document.getElementById('pNote').value = '';
});

// ==================== Project context menu ====================
let projCtxPid = null;
const projCtxMenu = document.getElementById('projCtxMenu');

function showProjectCtxMenu(x, y, pid) {
  projCtxPid = pid;
  projCtxMenu.style.left = x + 'px';
  projCtxMenu.style.top  = y + 'px';

function hideProjectCtxMenu() { projCtxMenu.style.display = 'none'; }

document.getElementById('projCtxEdit').addEventListener('click', () => {

document.getElementById('editPColor').addEventListener('input', function() {

});

document.getElementById('confirmEditProject').addEventListener('click', () => {
  const pid  = document.getElementById('editPid').value;

// ==================== Reactor management ====================
document.getElementById('manageReactorBtn').addEventListener('click', () => {
  buildReactorList();
  openPanel('reactorPanel');
});
document.getElementById('closeReactorPanel').addEventListener('click', closeAllPanels);

function buildReactorList() {
  const list = document.getElementById('reactorList');
  list.innerHTML = '';
  reactors.forEach((r, idx) => {
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;align-items:center;gap:6px;background:#f5f5f0;border-radius:6px;padding:6px 8px';
    div.innerHTML = `
      <span style="font-size:11px;color:#888780;min-width:44px">${r.id}</span>
      <input type="text" value="${r.name}" style="flex:1;font-size:12px;padding:3px 6px;border:0.5px solid rgba(0,0,0,0.18);border-radius:4px;background:#fff;min-width:70px" data-ridx="${idx}" data-field="name">
      <input type="text" value="${r.cap}" placeholder="容积" style="width:70px;font-size:12px;padding:3px 6px;border:0.5px solid rgba(0,0,0,0.18);border-radius:4px;background:#fff" data-ridx="${idx}" data-field="cap">
      <button class="btn danger" style="padding:2px 8px;font-size:11px" data-ridx="${idx}">删</button>`;
    div.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('change', function() {
        reactors[+this.dataset.ridx][this.dataset.field] = this.value.trim();
        saveState();
      });
    });
    div.querySelector('button').addEventListener('click', function() {
      if (!confirm('确认删除 ' + reactors[+this.dataset.ridx].name + '？')) return;
      reactors.splice(+this.dataset.ridx, 1);
      saveState(); buildReactorList(); buildTable(); calcStats();
    });
    list.appendChild(div);
  });
}

document.getElementById('addReactorBtn2').addEventListener('click', () => {
  const id   = document.getElementById('newRId').value.trim().toUpperCase();
  const name = document.getElementById('newRName').value.trim();
  const cap  = document.getElementById('newRCap').value.trim();
  if (!id || !name) { alert('请填写编号和名称'); return; }
  if (reactors.find(r => r.id === id)) { alert('编号已存在'); return; }
  reactors.push({ id, name, cap });
  saveState(); buildReactorList(); buildTable(); calcStats();
  ['newRId','newRName','newRCap'].forEach(fid => document.getElementById(fid).value = '');
});

// ==================== Month navigation ====================
document.getElementById('prevMonth').addEventListener('click', () => {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  refresh();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  refresh();
});

// ==================== Clear month ====================
document.getElementById('clearMonthBtn').addEventListener('click', () => {
  if (!confirm('确认清空 ' + fmtMonth(viewYear,viewMonth) + ' 所有排产数据？此操作不可恢复！')) return;
  const days = daysInMonth(viewYear, viewMonth);
  reactors.forEach(r => {
    for (let d = 1; d <= days; d++) {
      delete plan[planKey(r.id, viewYear, viewMonth, d)];
    }
  });
  saveState(); buildTable(); calcStats();
});

// ==================== Print ====================
document.getElementById('printBtn').addEventListener('click', () => window.print());

// ==================== Export CSV ====================
document.getElementById('exportBtn').addEventListener('click', () => {
  const days = daysInMonth(viewYear, viewMonth);
  const BOM  = '\uFEFF';
  const hdr  = ['釜位', ...Array.from({length:days},(_,i)=>i+1+'日')].join(',') + '\n';
  let csv = BOM + hdr;
  reactors.forEach(r => {
    const row = [r.name];
    for (let d = 1; d <= days; d++) {
      const k = planKey(r.id, viewYear, viewMonth, d);
      const e = plan[k];
      const pr = e ? getProject(e.pid) : null;
      row.push(pr ? (pr.name + (e.note?'('+e.note+')':'')) : '');
    }
    csv += row.join(',') + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '月度排产_' + viewYear + String(viewMonth+1).padStart(2,'0') + '.csv';
  a.click();
});

// ==================== Panels ====================
function openPanel(id) {
  ['addProjectPanel','reactorPanel','cellPanel','editProjectPanel'].forEach(p => {
    document.getElementById(p).classList.remove('open');
  });
  const el = document.getElementById(id);
  el.classList.add('open');
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function closeAllPanels() {
  ['addProjectPanel','reactorPanel','cellPanel','editProjectPanel'].forEach(p => {
    document.getElementById(p).classList.remove('open');
  });
}

// ==================== Refresh ====================
function refresh() {
  document.getElementById('monthLabel').textContent = fmtMonth(viewYear, viewMonth);
  buildLegend();
  buildTable();
  calcStats();
}

// ==================== Init ====================
async function init() {
  // 1. 先加载本地数据并渲染，确保页面不白屏
  const local = loadFromLocal();
  projects = local.projects;
  reactors = local.reactors.length ? local.reactors : defaultReactors();
  plan     = local.plan;
  pidCounter = projects.length ? Math.max(...projects.map(p => parseInt(p.id.replace('p','')) || 0)) + 1 : 7;
  if (projects.length) selectedProjectId = projects[0].id;
  refresh();

  // 2. 后台尝试同步云端（不阻塞渲染）
  if (USE_CLOUD) {
    setSyncStatus('同步中...');
    try {
      const cloud = await Promise.race([
        loadFromCloud(),
        new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000))
      ]);
      if (cloud) {
        // 云端有数据则覆盖（以云端为准）
        projects = cloud.projects;
        reactors = cloud.reactors.length ? cloud.reactors : defaultReactors();
        plan     = cloud.plan;
        pidCounter = projects.length ? Math.max(...projects.map(p => parseInt(p.id.replace('p','')) || 0)) + 1 : 7;
        if (projects.length) selectedProjectId = projects[0].id;
        refresh();
        setSyncStatus('已同步');
      } else {
        setSyncStatus('无云端数据');
      }
  } catch(e) {
    console.error('云端同步失败:', e);
    setSyncStatus('同步失败(' + (e.message || e.name || 'error') + ')');
    setTimeout(() => setSyncStatus('已同步'), 4000);
  }
  } else {
    setSyncStatus('本地模式');
    const badge = document.getElementById('syncStatus');
    if (badge) badge.style.color = '#e8a020';
    const banner = document.getElementById('cloudBanner');
    if (banner) banner.classList.add('show');
  }
}
init();
</script>
